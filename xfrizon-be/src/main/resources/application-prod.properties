# Production Configuration
# This file is used when running with: java -jar app.jar --spring.profiles.active=prod

# Server Configuration
server.port=8081
server.servlet.context-path=/api/v1
server.error.whitelabel.enabled=false
server.error.include-message=always

# Database Configuration (Railway automatically provides these env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/xfrizon_ts}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connectionTimeout=20000

# JPA/Hibernate Configuration - OPTIMIZED FOR PRODUCTION
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Logging Configuration
logging.level.root=WARN
logging.level.com.xfrizon=INFO

# JWT Configuration - Use env var in production
jwt.secret=${JWT_SECRET:change-this-to-production-secret-key}
jwt.expiration=86400000

# Multipart File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File Upload Configuration
# For Linux/Mac: /var/www/xfrizon/uploads or /home/xfrizon/uploads
# For Docker: /app/uploads (mount as volume)
# For AWS: Store in S3 bucket (requires separate implementation)
app.upload.dir=/var/www/xfrizon/uploads

# Jackson Configuration
spring.jackson.time-zone=UTC

# Stripe Configuration (set real values in production)
stripe.api.key=replace-with-prod-stripe-secret-key
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_replace_with_production_webhook_secret}
xfrizon.service-fee-rate=0.10
xfrizon.stripe.connect.country=NG
xfrizon.stripe.connect.refresh-url=https://your-frontend-domain/organizer/settings/payouts
xfrizon.stripe.connect.return-url=https://your-frontend-domain/organizer/settings/payouts?stripe=connected

